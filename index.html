<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Pesquisa de Preços Gov</title>
    <script src="https://cloudflare.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #05080f; --surface: #0d1420; --surface2: #131d2e;
            --border: rgba(0, 180, 255, 0.13); --accent: #00b4ff;
            --accent2: #00e5a0; --danger: #ff4f4f; --warn: #ffb84f;
            --text: #dce8f5; --muted: #4a6080;
            --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); }
        
        /* Telas */
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: radial-gradient(ellipse at 50% 0%, #00253a 0%, var(--bg) 65%); padding: 20px; }
        #app-screen { display: none; flex-direction: column; min-height: 100vh; }
        
        /* Login */
        .login-box { width: 100%; max-width: 340px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 26px; display: flex; flex-direction: column; gap: 14px; }
        .lbl { font-size: 10px; letter-spacing: 2px; color: var(--accent); text-transform: uppercase; font-family: var(--mono); margin-bottom: 5px; display: block; }
        input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 13px; color: var(--text); outline: none; }
        .btn-primary { background: var(--accent); color: var(--bg); border: none; border-radius: 8px; padding: 14px; font-weight: 700; font-family: var(--mono); cursor: pointer; letter-spacing: 1px; }

        /* App Layout */
        .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 15px; display: flex; justify-content: space-between; align-items: center; sticky: top; }
        .search-area { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .search-row { display: flex; gap: 10px; }
        .search-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; color: white; }
        .btn-search { background: var(--accent); color: var(--bg); border: none; border-radius: 10px; padding: 0 15px; cursor: pointer; }

        /* Analise e Cards */
        .results { padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .analysis-card { border-radius: 12px; padding: 15px; border: 1px solid var(--border); margin-bottom: 10px; }
        .analysis-card.ok { border-color: var(--accent2); background: rgba(0, 229, 160, 0.05); }
        .analysis-card.warn { border-color: var(--danger); background: rgba(255, 79, 79, 0.05); }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .card-orgao { font-size: 13px; font-weight: 600; color: var(--text); }
        .card-valor { font-family: var(--mono); color: var(--accent2); font-weight: 700; }
        .row { display: flex; justify-content: space-between; font-size: 11px; margin-bottom: 4px; color: var(--muted); }
        .row span:last-child { color: var(--text); font-family: var(--mono); }
        
        .status-bar { margin: 0 15px; padding: 10px; border-radius: 8px; font-size: 12px; font-family: var(--mono); display: none; }
        .btn-export { background: var(--surface2); color: var(--accent); border: 1px solid var(--border); padding: 12px; border-radius: 10px; cursor: pointer; font-family: var(--mono); margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div style="text-align:center; margin-bottom: 20px;">
            <div style="background:var(--accent); color:var(--bg); font-size:10px; padding:4px 10px; font-family:var(--mono); letter-spacing:2px; display:inline-block; border-radius:2px;">GOV · LICITAÇÕES</div>
            <h1 style="font-family:var(--mono); color:white; margin-top:10px;">Pesquisa de Preços</h1>
        </div>
        <div class="login-box">
            <div><label class="lbl">Usuário</label><input type="text" id="inp-user" placeholder="rogerio"></div>
            <div><label class="lbl">Senha</label><input type="password" id="inp-pass" placeholder="****"></div>
            <div id="login-err" style="color:var(--danger); font-size:11px; display:none;">Credenciais incorretas.</div>
            <button class="btn-primary" onclick="doLogin()">ENTRAR</button>
        </div>
    </div>

    <div id="app-screen">
        <div class="topbar">
            <div>
                <div style="font-family:var(--mono); color:var(--accent); font-size:14px; font-weight:700;">PREÇOS GOV</div>
                <div style="font-size:10px; color:var(--muted);">Lei 14.133/2021 · Últimos 5 meses</div>
            </div>
            <button onclick="doLogout()" style="background:none; border:1px solid var(--border); color:var(--muted); padding:5px 10px; border-radius:5px; cursor:pointer;">SAIR</button>
        </div>

        <div class="search-area">
            <div class="search-row">
                <input class="search-input" id="inp-search" type="text" placeholder="Ex: Cadeira Ergonômica">
                <button class="btn-search" onclick="buscar()">🔍</button>
            </div>
        </div>

        <div id="status-bar" class="status-bar"></div>
        <div class="results" id="results"></div>
    </div>

    <script>
        // CONFIGURAÇÃO: COLOQUE SEU LINK DO RENDER AQUI
        const URL_API = "https://onrender.com";

        let dadosAtuais = [];

        function doLogin() {
            const u = document.getElementById('inp-user').value.toLowerCase();
            const p = document.getElementById('inp-pass').value;
            if (u === "rogerio" && p === "1234") {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'flex';
            } else {
                document.getElementById('login-err').style.display = 'block';
            }
        }

        function doLogout() { location.reload(); }

        function setStatus(msg, type) {
            const bar = document.getElementById('status-bar');
            bar.style.display = 'block';
            bar.innerText = msg;
            bar.style.color = type === 'error' ? 'var(--danger)' : 'var(--accent2)';
        }

        async function buscar() {
            const termo = document.getElementById('inp-search').value;
            if(!termo) return;
            
            setStatus("Buscando no Portal Nacional...", "info");
            document.getElementById('results').innerHTML = "";

            try {
                const response = await fetch(`${URL_API}?produto=${encodeURIComponent(termo)}`);
                const data = await response.json();
                
                if(data.sucesso && data.mais_opcoes.length > 0) {
                    dadosAtuais = data.mais_opcoes;
                    setStatus(data.mais_opcoes.length + " registros encontrados", "ok");
                    renderizar(data.sugestao_ideal, data.mais_opcoes);
                } else {
                    setStatus("Nenhum registro encontrado.", "error");
                }
            } catch (e) {
                setStatus("Erro ao conectar com o servidor Render.", "error");
            }
        }

        function renderizar(ideais, todos) {
            const container = document.getElementById('results');
            
            // Cálculo de variação (Regra dos 20%)
            let analiseHtml = "";
            if(ideais.length >= 2) {
                const min = ideais[0].preco;
                const max = ideais[ideais.length-1].preco;
                const varPct = ((max - min) / min) * 100;
                const apto = varPct <= 20;
                
                analiseHtml = `
                    <div class="analysis-card ${apto ? 'ok' : 'warn'}">
                        <div style="font-family:var(--mono); font-size:12px; font-weight:700;">
                            ${apto ? '✅ APTOS (VARIAÇÃO: ' : '⚠️ ALERTA (VARIAÇÃO: '}${varPct.toFixed(1)}%)
                        </div>
                        <div style="font-size:10px; color:var(--muted); margin-top:5px;">
                            Limite de 20% conforme Art. 23 da Lei 14.133/2021.
                        </div>
                    </div>
                `;
            }

            let cardsHtml = todos.map(t => `
                <div class="card">
                    <div class="card-header">
                        <div class="card-orgao">${t.orgao}</div>
                        <div class="card-valor">R$ ${t.preco.toFixed(2)}</div>
                    </div>
                    <div class="row"><span>Data:</span><span>${t.data}</span></div>
                    <div class="row"><span>Esfera:</span><span>${t.esfera}</span></div>
                    <div class="row"><span>Fornecedor:</span><span>${t.fornecedor}</span></div>
                </div>
            `).join('');

            container.innerHTML = analiseHtml + `<button class="btn-export" onclick="gerarPDF()">📄 GERAR RELATÓRIO PDF/A</button>` + cardsHtml;
        }

        function gerarPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFontSize(16);
            doc.text("Relatório de Preços Governamentais", 20, 20);
            let y = 35;
            dadosAtuais.slice(0, 10).forEach(d => {
                doc.setFontSize(10);
                doc.text(`${d.data} - R$ ${d.preco.toFixed(2)} - ${d.orgao}`, 20, y);
                y += 7;
            });
            doc.save("relatorio_precos.pdf");
        }
    </script>
</body>
</html>
