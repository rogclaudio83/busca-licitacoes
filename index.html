<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Preços // Auditoria</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #05080f; --surface: #0d1420; --accent: #00b4ff; --success: #00e5a0; --text: #dce8f5; --border: rgba(0, 180, 255, 0.15); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; }
        .screen { display: none; min-height: 100vh; flex-direction: column; }
        .active { display: flex; }
        #login-screen { align-items: center; justify-content: center; background: radial-gradient(circle at top, #00253a, var(--bg)); }
        .login-box { background: var(--surface); padding: 40px; border-radius: 12px; border: 1px solid var(--border); width: 350px; }
        input { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; outline: none; font-family: 'IBM Plex Sans', sans-serif; }
        .btn-main { width: 100%; padding: 14px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'IBM Plex Mono', monospace; }
        .btn-main:hover { opacity: 0.85; }
        header { padding: 15px 40px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 30px 40px; max-width: 1100px; margin: 0 auto; width: 100%; }
        .search-card { background: var(--surface); padding: 20px; border-radius: 12px; border: 1px solid var(--border); display: flex; gap: 15px; }
        .search-card input { margin-bottom: 0; }
        .analysis-badge { padding: 15px; border-radius: 8px; margin: 20px 0; font-family: 'IBM Plex Mono', monospace; font-size: 0.9rem; text-align: center; border: 1px solid transparent; }
        .ok { background: rgba(0, 229, 160, 0.05); border-color: var(--success); color: var(--success); }
        .warn { background: rgba(255, 79, 79, 0.05); border-color: #ff4f4f; color: #ff4f4f; }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 15px; border-radius: 10px; margin-top: 15px; }
        .price { color: var(--success); font-family: 'IBM Plex Mono', monospace; font-weight: bold; font-size: 1.3rem; }
    </style>
</head>
<body>
    <div id="login-screen" class="screen active">
        <div class="login-box">
            <h2 style="color:var(--accent); text-align:center; font-family:'IBM Plex Mono',monospace; margin-bottom:20px;">GOV.DATA</h2>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn-main" onclick="login()">ENTRAR</button>
        </div>
    </div>

    <div id="app-screen" class="screen">
        <header>
            <div style="color:var(--accent); font-family:'IBM Plex Mono',monospace; font-weight:bold;">AUDITORIA // PNCP</div>
            <button onclick="location.reload()" style="background:none; border:1px solid #4a6080; color:#4a6080; padding:5px 10px; cursor:pointer; border-radius:4px;">SAIR</button>
        </header>
        <div class="container">
            <div class="search-card">
                <input type="text" id="item" placeholder="Digite o produto (ex: caneta)" onkeydown="if(event.key==='Enter') buscar()">
                <button onclick="buscar()" style="background:var(--accent); border:none; padding:0 25px; border-radius:6px; cursor:pointer; font-weight:bold; color:#000; font-family:'IBM Plex Mono',monospace; white-space:nowrap;">BUSCAR</button>
            </div>
            <div id="status" style="margin-top:15px; font-size:12px; color:var(--accent); font-family:'IBM Plex Mono',monospace;"></div>
            <div id="analise"></div>
            <div id="resultados"></div>
        </div>
    </div>

    <script>
        const API_URL = "https://radar-de-precos-eh36.onrender.com";

        function login() {
            const user = document.getElementById('user').value;
            const pass = document.getElementById('pass').value;
            if (user === "rogerio" && pass === "1234") {
                document.getElementById('login-screen').classList.remove('active');
                document.getElementById('app-screen').classList.add('active');
            } else {
                alert("Usuário ou senha incorretos.");
            }
        }

        async function buscar() {
            const termo = document.getElementById('item').value.trim();
            if (!termo) return;

            document.getElementById('status').innerText = ">> CONSULTANDO PNCP...";
            document.getElementById('resultados').innerHTML = "";
            document.getElementById('analise').innerHTML = "";

            try {
                const response = await fetch(`${API_URL}?produto=${encodeURIComponent(termo)}`);

                if (!response.ok) {
                    throw new Error(`Erro HTTP: ${response.status}`);
                }

                const res = await response.json();

                if (res.sucesso && res.mais_opcoes && res.mais_opcoes.length > 0) {
                    const dados = res.mais_opcoes;
                    document.getElementById('status').innerText = `>> ${dados.length} TRANSAÇÕES ENCONTRADAS.`;

                    // Cálculo Preço Aplicável (Regra 20%)
                    const min = dados[0].preco;
                    const max = dados[Math.min(2, dados.length - 1)].preco;
                    const variacao = ((max - min) / min) * 100;
                    const apto = variacao <= 20;

                    document.getElementById('analise').innerHTML = `
                        <div class="analysis-badge ${apto ? 'ok' : 'warn'}">
                            ${apto ? '✅ PREÇO APLICÁVEL: APTO' : '⚠️ ALERTA: VARIAÇÃO ELEVADA'} // DIFERENÇA: ${variacao.toFixed(1)}%
                        </div>`;

                    document.getElementById('resultados').innerHTML = dados.map(t => `
                        <div class="card">
                            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                                <div style="font-weight:600; font-size:13px; max-width:70%;">${t.orgao}</div>
                                <div class="price">R$ ${t.preco.toFixed(2)}</div>
                            </div>
                            <div style="font-size:10px; color:#4a6080; margin-top:10px;">DATA: ${t.data} | ESFERA: ${t.esfera}</div>
                        </div>`).join('');
                } else {
                    document.getElementById('status').innerText = ">> NENHUMA TRANSAÇÃO ENCONTRADA NO PNCP.";
                }
            } catch (e) {
                document.getElementById('status').innerText = `>> ERRO DE CONEXÃO COM O SERVIDOR: ${e.message}`;
            }
        }
    </script>
</body>
</html>
