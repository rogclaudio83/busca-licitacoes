<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GovPreços - Painel de Auditoria de Licitações</title>
    <!-- Bibliotecas Necessárias -->
    <script src="https://cloudflare.com"></script>
    <link rel="stylesheet" href="https://cloudflare.com">
    
    <style>
        :root {
            --primary: #0a2540;
            --secondary: #4a5568;
            --light-bg: #f7fafc;
            --border-color: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
        }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background-color: var(--light-bg); margin: 0; padding: 0; color: #1a202c; }
        
        /* Sistema de Telas */
        .page { display: none; min-height: 100vh; }
        .page.active { display: flex; }
        
        /* Tela de Login */
        #login-page { justify-content: center; align-items: center; background-color: var(--primary); }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); width: 100%; max-width: 400px; }
        .login-card h2 { color: var(--primary); text-align: center; margin-bottom: 8px; font-size: 24px; }
        .login-card p { color: var(--secondary); text-align: center; margin-bottom: 24px; font-size: 14px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 14px; color: #4a5568; }
        .form-group input { width: 100%; padding: 10px 12px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 14px; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background-color 0.2s; }
        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: #031525; }
        
        /* Tela Principal (Dashboard) */
        #app-page { flex-direction: column; }
        header { background-color: white; border-bottom: 1px solid var(--border-color); padding: 16px 40px; display: flex; justify-content: space-between; align-items: center; }
        header h1 { margin: 0; font-size: 18px; color: var(--primary); font-weight: 600; }
        .logout-btn { background: none; border: 1px solid #cbd5e0; color: #4a5568; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        
        main { padding: 40px; max-width: 1400px; margin: 0 auto; width: 100%; }
        
        /* Barra de Busca */
        .search-container { background: white; padding: 24px; border-radius: 8px; border: 1px solid var(--border-color); margin-bottom: 32px; }
        .search-grid { display: grid; grid-template-columns: 2fr 1fr 1fr; gap: 16px; }
        
        /* Títulos de Seção */
        .section-title { color: var(--primary); font-size: 16px; font-weight: 600; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Cards de Sugestão (As 3 Transações) */
        .top-results { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 32px; }
        .card { background: white; padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); position: relative; }
        .card.selected { border-color: var(--success); box-shadow: 0 0 0 1px var(--success); }
        .card .price { font-size: 24px; font-weight: 700; color: var(--success); margin: 8px 0; }
        .card .orgao { font-size: 12px; color: var(--secondary); font-weight: 500; text-transform: uppercase; }
        
        /* Tabela Profissional */
        .table-container { background: white; border-radius: 8px; border: 1px solid var(--border-color); overflow: hidden; }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 13px; }
        th, td { padding: 14px 16px; border-bottom: 1px solid var(--border-color); }
        th { background-color: #f8fafc; color: #4a5568; font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 0.05em; }
        tr:hover { background-color: #f8fafc; }
        
        .btn-report { background-color: var(--success); color: white; border: none; padding: 12px 24px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; float: right; margin-top: 24px; }
        .btn-report:hover { background-color: #059669; }
        
        input[type="checkbox"] { transform: scale(1.1); cursor: pointer; }
    </style>
</head>
<body>

    <!-- TELA DE LOGIN -->
    <div id="login-page" class="page active">
        <div class="login-card">
            <h2>GovPreços</h2>
            <p>Faça login para acessar os dados do portal nacional</p>
            <div class="form-group">
                <label>Usuário</label>
                <input type="text" id="username" placeholder="Digite seu usuário">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" placeholder="Digite sua senha">
            </div>
            <button class="btn btn-primary" onclick="executarLogin()">Acessar Painel</button>
            <p id="login-error" style="color: #e53e3e; text-align: center; margin-top: 12px; display: none;">Credenciais incorretas.</p>
        </div>
    </div>

    <!-- TELA DO APLICATIVO -->
    <div id="app-page" class="page">
        <header>
            <h1>Painel de Transações Governamentais</h1>
            <div>
                <span style="font-size: 14px; color: #4a5568; margin-right: 16px;">Operador: <strong id="user-display"></strong></span>
                <button class="logout-btn" onclick="executarLogout()">Sair</button>
            </div>
        </header>

        <main>
            <!-- Painel de Filtros -->
            <div class="search-container">
                <div class="search-grid">
                    <div class="form-group">
                        <label>Item / Produto</label>
                        <input type="text" id="search-item" value="Caneta" placeholder="Digite o produto">
                    </div>
                    <div class="form-group">
                        <label>Valor Mínimo (R$)</label>
                        <input type="number" id="min-price" placeholder="Menor valor automático" step="0.01">
                    </div>
                    <div class="form-group" style="display: flex; align-items: flex-end;">
                        <button class="btn btn-primary" onclick="executarBusca()"><i class="fa-solid fa-magnifying-glass"></i> Pesquisar Transações</button>
                    </div>
                </div>
            </div>

            <!-- Sugestão Ideal -->
            <div class="section-title">
                <span>🎯 Sugestão Ideal (Variação máxima de 20% | Últimos 5 meses)</span>
            </div>
            <div class="top-results" id="top-results-container"></div>

            <!-- Mais Opções -->
            <div class="section-title">
                <span>🔍 Histórico Geral Encontrado</span>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 50px;">Sel.</th>
                            <th>Valor Unitário</th>
                            <th>Órgão Comprador</th>
                            <th>Esfera</th>
                            <th>Data</th>
                            <th>Fornecedor / CNPJ</th>
                        </tr>
                    </thead>
                    <tbody id="all-results-table"></tbody>
                </table>
            </div>

            <button class="btn btn-report" onclick="gerarRelatorioPDF()"><i class="fa-solid fa-file-pdf"></i> Gerar Relatório PDF/A</button>
        </main>
    </div>

    <script>
        // ATENÇÃO: Substitua o link abaixo pela URL que o Render te deu
        const URL_API = "https://onrender.com";
        
        let transacoesCache = [];
        let selecionados = [];

        function executarLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if (user === "Rogerio" && pass === "1234") {
                document.getElementById('login-page').classList.remove('active');
                document.getElementById('app-page').classList.add('active');
                document.getElementById('user-display').innerText = user;
                executarBusca();
            } else {
                document.getElementById('login-error').style.display = 'block';
            }
        }

        function executarLogout() {
            document.getElementById('app-page').classList.remove('active');
            document.getElementById('login-page').classList.add('active');
            document.getElementById('password').value = '';
            document.getElementById('login-error').style.display = 'none';
        }

        async function executarBusca() {
            const produto = document.getElementById('search-item').value;
            const valMin = document.getElementById('min-price').value;
            
            let url = `${URL_API}?produto=${encodeURIComponent(produto)}`;
            if(valMin) url += `&valor_minimo=${valMin}`;

            try {
                const response = await fetch(url);
                const dados = await response.json();
                
                if (dados.sucesso) {
                    transacoesCache = dados.mais_opcoes;
                    selecionados = dados.sugestao_ideal.map(t => t.id);
                    renderizarInterface(dados.sugestao_ideal, dados.mais_opcoes);
                }
            } catch (error) {
                alert("Erro ao conectar com o servidor do Render. Verifique a URL.");
            }
        }

        function renderizarInterface(ideais, todas) {
            const topContainer = document.getElementById('top-results-container');
            topContainer.innerHTML = '';
            ideais.forEach(item => {
                topContainer.innerHTML += `
                    <div class="card selected">
                        <div class="orgao">${item.orgao}</div>
                        <div class="price">R$ ${item.preco.toFixed(2)}</div>
                        <div style="font-size: 11px; color: var(--secondary);">Data: ${item.data} | Esfera: ${item.esfera}</div>
                    </div>`;
            });

            const tableBody = document.getElementById('all-results-table');
            tableBody.innerHTML = '';
            todas.forEach(item => {
                const isSelected = selecionados.includes(item.id) ? 'checked' : '';
                tableBody.innerHTML += `
                    <tr>
                        <td style="text-align: center;">
                            <input type="checkbox" ${isSelected} onchange="toggleSelecao(${item.id})">
                        </td>
                        <td style="font-weight: 600; color: var(--success);">R$ ${item.preco.toFixed(2)}</td>
                        <td>${item.orgao}</td>
                        <td>${item.esfera}</td>
                        <td>${item.data}</td>
                        <td>
                            <div>${item.fornecedor}</div>
                            <div style="font-size: 11px; color: #a0aec0;">CNPJ: ${item.cnpj}</div>
                        </td>
                    </tr>`;
            });
        }

        function toggleSelecao(id) {
            const index = selecionados.indexOf(id);
            if (index > -1) selecionados.splice(index, 1);
            else selecionados.push(id);
        }

        function gerarRelatorioPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            const itensParaImprimir = transacoesCache.filter(t => selecionados.includes(t.id));
            
            doc.setFillColor(10, 37, 64);
            doc.rect(0, 0, 210, 25, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(16);
            doc.text("Relatório de Pesquisa de Preços Públicos", 15, 16);
            
            doc.setTextColor(26, 32, 44);
            doc.setFontSize(11);
            let y = 35;
            
            itensParaImprimir.forEach((t, index) => {
                if(y > 270) { doc.addPage(); y = 20; }
                doc.setFont("helvetica", "bold");
                doc.text(`${index + 1}. Valor Unitário: R$ ${t.preco.toFixed(2)}`, 15, y);
                doc.setFont("helvetica", "normal");
                y += 6;
                doc.text(`Órgão: ${t.orgao} | Esfera: ${t.esfera} | Data: ${t.data}`, 15, y);
                y += 6;
                doc.text(`Fornecedor: ${t.fornecedor} | CNPJ: ${t.cnpj}`, 15, y);
                y += 10;
                doc.line(15, y, 195, y);
                y += 10;
            });
            
            doc.save("Relatorio_PNCP.pdf");
        }
    </script>
</body>
</html>
