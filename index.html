<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radar de Preços // Auditoria</title>
    <script src="https://cloudflare.com"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --bg: #05080f; --surface: #0d1420; --accent: #00b4ff; --success: #00e5a0; --text: #dce8f5; --border: rgba(0, 180, 255, 0.15); --muted: #4a6080; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; }
        .screen { display: none; min-height: 100vh; flex-direction: column; }
        .active { display: flex; }
        #login-screen { align-items: center; justify-content: center; background: radial-gradient(circle at top, #00253a, var(--bg)); }
        .login-box { background: var(--surface); padding: 40px; border-radius: 12px; border: 1px solid var(--border); width: 350px; }
        input { width: 100%; background: #000; border: 1px solid var(--border); color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; outline: none; }
        .btn-main { width: 100%; padding: 14px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-family: 'IBM Plex Mono'; }
        header { padding: 15px 40px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .container { padding: 30px 40px; max-width: 1100px; margin: 0 auto; width: 100%; }
        .search-card { background: var(--surface); padding: 20px; border-radius: 12px; border: 1px solid var(--border); display: flex; gap: 15px; }
        .analysis-badge { padding: 15px; border-radius: 8px; margin: 20px 0; font-family: 'IBM Plex Mono'; font-size: 0.9rem; text-align: center; border: 1px solid transparent; }
        .ok { background: rgba(0, 229, 160, 0.05); border-color: var(--success); color: var(--success); }
        .warn { background: rgba(255, 79, 79, 0.05); border-color: #ff4f4f; color: #ff4f4f; }
        .card { background: var(--surface); border: 1px solid var(--border); padding: 15px; border-radius: 10px; margin-top: 15px; }
        .price { color: var(--success); font-family: 'IBM Plex Mono'; font-weight: bold; font-size: 1.3rem; }
    </style>
</head>
<body>
    <div id="login-screen" class="screen active">
        <div class="login-box">
            <h2 style="color:var(--accent); text-align:center; font-family:'IBM Plex Mono'; margin-bottom:20px;">GOV.DATA</h2>
            <input type="text" id="user" placeholder="Usuário">
            <input type="password" id="pass" placeholder="Senha">
            <button class="btn-main" onclick="login()">ENTRAR</button>
            <p id="err" style="color:red; font-size:11px; text-align:center; margin-top:10px; display:none;">Credenciais inválidas.</p>
        </div>
    </div>

    <div id="app-screen" class="screen">
        <header>
            <div style="color:var(--accent); font-family:'IBM Plex Mono'; font-weight:bold;">AUDITORIA // PNCP</div>
            <button onclick="location.reload()" style="background:none; border:1px solid var(--muted); color:var(--muted); padding:5px 10px; cursor:pointer; border-radius:4px; font-size:11px;">LOGOUT</button>
        </header>
        <div class="container">
            <div class="search-card">
                <input type="text" id="item" placeholder="Digite o produto (ex: caneta)">
                <button onclick="buscar()" style="background:var(--accent); border:none; padding:0 25px; border-radius:6px; cursor:pointer; font-weight:bold;">BUSCAR</button>
            </div>
            <div id="status" style="margin-top:15px; font-size:12px; color:var(--accent); font-family:'IBM Plex Mono';"></div>
            <div id="analise"></div>
            <div id="resultados"></div>
        </div>
    </div>

    <script>
        // 🔗 URL CORRIGIDA PARA O SEU PROJETO REAL
        const API_URL = "https://onrender.com";

        function login() {
            if(document.getElementById('user').value === "rogerio" && document.getElementById('pass').value === "1234") {
                document.getElementById('login-screen').classList.remove('active');
                document.getElementById('app-screen').classList.add('active');
            } else { document.getElementById('err').style.display = 'block'; }
        }

        async function buscar() {
            const termo = document.getElementById('item').value;
            if(!termo) return;
            document.getElementById('status').innerText = ">> CONSULTANDO PNCP...";
            document.getElementById('resultados').innerHTML = "";
            document.getElementById('analise').innerHTML = "";

            try {
                const response = await fetch(`${API_URL}?produto=${encodeURIComponent(termo)}`);
                const res = await response.json();
                
                if(res.sucesso && res.mais_opcoes.length > 0) {
                    document.getElementById('status').innerText = `>> ${res.mais_opcoes.length} ITENS ENCONTRADOS.`;
                    
                    // Regra dos 20%
                    const dados = res.mais_opcoes;
                    const min = dados.preco;
                    const max = dados[Math.min(2, dados.length - 1)].preco;
                    const variacao = ((max - min) / min) * 100;
                    const apto = variacao <= 20;

                    document.getElementById('analise').innerHTML = `
                        <div class="analysis-badge ${apto ? 'ok' : 'warn'}">
                            ${apto ? '✅ PREÇO APLICÁVEL: APTO' : '⚠️ ALERTA: VARIAÇÃO ELEVADA'} // DIFERENÇA: ${variacao.toFixed(1)}%
                        </div>`;

                    document.getElementById('resultados').innerHTML = dados.map(t => `
                        <div class="card">
                            <div style="display:flex; justify-content:space-between;">
                                <div style="font-weight:600; font-size:14px; max-width:70%;">${t.orgao}</div>
                                <div class="price">R$ ${t.preco.toFixed(2)}</div>
                            </div>
                            <div style="font-size:11px; color:var(--muted); margin-top:10px;">DATA: ${t.data} | ESFERA: ${t.esfera}</div>
                        </div>`).join('');
                } else { document.getElementById('status').innerText = ">> NENHUMA TRANSAÇÃO ENCONTRADA."; }
            } catch (e) { document.getElementById('status').innerText = ">> ERRO DE CONEXÃO. TENTE NOVAMENTE."; }
        }
    </script>
</body>
</html>
